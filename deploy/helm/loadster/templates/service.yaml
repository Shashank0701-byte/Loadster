apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-master
  labels:
    app.kubernetes.io/name: loadster-master
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: loadster-master
    app.kubernetes.io/instance: {{ .Release.Name }}
