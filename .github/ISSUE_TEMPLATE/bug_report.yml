name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce the behavior
      description: What commands did you run? What config did you use?
      placeholder: |
        1. Create config '...'
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Loadster Version
      description: Which version of Loadster are you using? (e.g. v1.0.0 or commit hash)
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: What is your Go version? (Run `go version`)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you running on? (e.g. Windows 11, macOS Sonoma, Ubuntu 22.04)
    validations:
      required: true
